<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>زلطن تريبول • Zliten Tripol</title>
    <!-- Firebase & Fonts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00b4d8;
            --secondary: #0077b6;
            --dark: #010a1f;
            --card: #041433;
            --text: #ffffff;
            --success: #2a9d8f;
            --danger: #e63946;
            --warning: #ffb703;
            --gray: #9ca3af;
        }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background-color: var(--dark); color: var(--text); margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        
        .btn { 
            width: 100%; padding: 12px; border-radius: 14px; border: none; font-weight: 700; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; 
            transition: all 0.2s; color: white; background: var(--primary);
        }
        .btn:active { transform: scale(0.97); filter: brightness(1.2); }
        .btn-primary { background: var(--primary); box-shadow: 0 4px 15px rgba(0, 180, 216, 0.3); }
        .btn-danger { background: var(--danger); }
        .btn-success { background: var(--success); }
        .btn-warning { background: var(--warning); color: #000; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-sm { padding: 8px 14px; font-size: 0.8rem; width: auto; }

        .card { background: var(--card); border-radius: 20px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(0, 180, 216, 0.2); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid rgba(0, 180, 216, 0.3); background: rgba(0,0,0,0.5); color: white; }
        label { display: block; margin-top: 8px; font-size: 0.9rem; color: var(--gray); }
        
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--dark); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--primary); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #010a1f; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--primary); z-index: 100; }
        .nav-link { color: #5a7b94; text-decoration: none; font-size: 0.7rem; text-align: center; cursor: pointer; transition: 0.3s; }
        .nav-link.active { color: var(--primary); transform: translateY(-5px); text-shadow: 0 0 10px var(--primary); }
        .nav-link i { font-size: 1.4rem; display: block; margin-bottom: 4px; }
        
        .badge { background: var(--danger); color: white; border-radius: 50%; padding: 2px 6px; font-size: 0.7rem; position: absolute; top: -5px; right: -5px; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); border: 2px solid var(--primary); width: 90%; max-width: 450px; padding: 20px; border-radius: 24px; max-height: 80vh; overflow-y: auto; }
        
        .img-preview { width: 100%; max-height: 160px; object-fit: cover; border-radius: 16px; margin-top: 10px; }
        .rating-stars { color: var(--warning); letter-spacing: 4px; }
        .store-avatar { width: 70px; height: 70px; border-radius: 20px; object-fit: cover; background: var(--primary); }
        .product-img { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; }
        
        .chat-bubble { padding: 10px 14px; border-radius: 18px; margin-bottom: 8px; max-width: 80%; word-break: break-word; }
        .bubble-left { background: var(--primary); align-self: flex-start; border-bottom-right-radius: 4px; }
        .bubble-right { background: #1e2a47; align-self: flex-end; border-bottom-left-radius: 4px; border: 1px solid #2a3a5c; }
        .bubble-system { background: transparent; color: var(--gray); align-self: center; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="modal-overlay" id="sys-modal">
    <div class="modal-content">
        <h3 id="modal-title" style="margin-top:0; color:var(--primary)"></h3>
        <div id="modal-body" style="margin-bottom: 15px;"></div>
        <div id="modal-inputs" style="margin-bottom: 15px;"></div>
        <div style="display:flex; gap:10px; justify-content:flex-end">
            <button id="modal-cancel" class="btn btn-danger btn-sm" style="display:none;">إلغاء</button>
            <button id="modal-ok" class="btn btn-primary btn-sm">حسناً</button>
        </div>
    </div>
</div>

<header id="main-header" style="display:none">
    <h3 style="margin:0; color:var(--primary); cursor:pointer;" onclick="navigate('home')"><i class="fas fa-bolt"></i> زلطن تريبول</h3>
    <div style="display:flex; gap:20px; align-items:center;">
        <div onclick="navigate('mail')" style="position:relative"><i class="fas fa-bell fa-lg"></i><span class="badge" id="notify-badge" style="display:none;">0</span></div>
        <div onclick="navigate('cart')" style="position:relative"><i class="fas fa-shopping-cart fa-lg"></i><span class="badge" id="cart-count">0</span></div>
        <i class="fas fa-sign-out-alt" style="color:var(--danger); cursor:pointer;" onclick="logout()"></i>
    </div>
</header>

<div id="app-content" style="padding: 15px; max-width: 600px; margin: auto;">
    <div style="text-align:center; margin-top:120px;">
        <i class="fas fa-spinner fa-spin fa-3x" style="color:var(--primary)"></i>
        <p>جاري الاتصال بقاعدة بيانات زلطن...</p>
    </div>
</div>

<nav class="bottom-nav" id="main-nav" style="display:none">
    <div class="nav-link" id="nav-home" onclick="navigate('home')"><i class="fas fa-store"></i>المتاجر</div>
    <div class="nav-link" id="nav-orders" onclick="navigate('orders')"><i class="fas fa-box"></i>طلباتي</div>
    <div class="nav-link" id="nav-driver" onclick="navigate('driver')"><i class="fas fa-motorcycle"></i>التوصيل</div>
    <div class="nav-link" id="nav-dev" onclick="navigate('dev')"><i class="fas fa-shield-alt"></i>معاذ</div>
</nav>

<script>
// ---------- Firebase ----------
const firebaseConfig = { databaseURL: "https://zliten-tripol-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// ---------- البيانات العامة ----------
let db = {
    users: [], stores: [], orders: [], chats: [], ad: "أهلاً بكم في زلطن تريبول 🚀",
    policy: "تطبيق زلطن تريبول غير مسؤول قانونياً عن أي تأخير أو سوء استخدام. استخدامك للتطبيق يعني موافقتك على تحمل كامل المسؤولية."
};
let currentUser = null;
let cart = [];
let tempImageBase64 = "";
let currentLocation = null;

// ---------- دوال المساعدة ----------
function sync() { database.ref('appData').set({ users: db.users, stores: db.stores, orders: db.orders, chats: db.chats, ad: db.ad, policy: db.policy }); }

function showModal(title, content, type = 'alert', onConfirm = null, inputHtml = '') {
    const modal = document.getElementById('sys-modal');
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-body').innerHTML = content;
    document.getElementById('modal-inputs').innerHTML = inputHtml;
    const btnOk = document.getElementById('modal-ok');
    const btnCancel = document.getElementById('modal-cancel');
    btnCancel.style.display = (type === 'confirm' || type === 'prompt') ? 'inline-flex' : 'none';
    modal.style.display = 'flex';
    
    btnOk.onclick = () => {
        modal.style.display = 'none';
        let inputVal = null;
        if (type === 'prompt') { const inp = document.getElementById('modal-input-field'); if(inp) inputVal = inp.value; }
        if (onConfirm) onConfirm(inputVal);
    };
    btnCancel.onclick = () => { modal.style.display = 'none'; };
}

function encodeImage(input) {
    const file = input.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onloadend = () => { tempImageBase64 = reader.result; };
        reader.readAsDataURL(file);
    }
}

function addNotification(userId, text, link = '') {
    const user = db.users.find(u => u.id === userId);
    if (!user) return;
    if (!user.notifications) user.notifications = [];
    user.notifications.unshift({ text, link, date: new Date().toLocaleString(), read: false });
    sync();
}

function notifyAllDrivers(text) {
    db.users.filter(u => u.type === 'driver').forEach(d => addNotification(d.id, text));
}

// ---------- تحميل البيانات ----------
function loadData() {
    database.ref('appData').on('value', snap => {
        const data = snap.val();
        if (data) {
            db.users = data.users || []; db.stores = data.stores || [];
            db.orders = data.orders || []; db.chats = data.chats || [];
            db.ad = data.ad || "أهلاً بكم"; db.policy = data.policy || "";
            db.orders.forEach(o => { if (!o.orderChat) o.orderChat = []; });
        } else { sync(); }
        checkAuth();
    });
}

function checkAuth() {
    const savedId = localStorage.getItem('z_user_id');
    if (savedId && db.users.length) {
        const user = db.users.find(u => u.id === savedId);
        if (user) { currentUser = user; updateUI(); return; }
    }
    renderAuth();
}

function logout() {
    localStorage.removeItem('z_user_id');
    currentUser = null;
    document.getElementById('main-header').style.display = 'none';
    document.getElementById('main-nav').style.display = 'none';
    renderAuth();
}

function updateUI() {
    if (!currentUser) return;
    document.getElementById('main-header').style.display = 'flex';
    document.getElementById('main-nav').style.display = 'flex';
    document.getElementById('cart-count').innerText = cart.length;
    const unread = (currentUser.notifications || []).filter(n => !n.read).length;
    const badge = document.getElementById('notify-badge');
    if (unread > 0) { badge.style.display = 'block'; badge.innerText = unread; } else badge.style.display = 'none';
    navigate('home');
}

// ---------- التنقل ----------
function navigate(page, param = null) {
    const content = document.getElementById('app-content');
    content.innerHTML = '';
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    const navItem = document.getElementById(`nav-${page}`);
    if (navItem) navItem.classList.add('active');
    
    if (page === 'home') renderHome(content);
    else if (page === 'orders') renderOrders(content);
    else if (page === 'driver') renderDriver(content);
    else if (page === 'dev') renderDev(content);
    else if (page === 'cart') renderCart(content);
    else if (page === 'store') renderStoreView(content, param);
    else if (page === 'mail') renderMail(content);
    else if (page === 'chat') renderFullChat(content, param);
    else if (page === 'policy') showPolicy();
    else if (page === 'my-store') renderStoreOwnerPanel(content);
    else if (page === 'track') renderOrderTracking(content, param);
}

// ---------- المصادقة ----------
function renderAuth() {
    document.getElementById('app-content').innerHTML = `
        <div class="card" style="margin-top:50px; text-align:center">
            <h2 style="color:var(--primary)">زلطن تريبول</h2>
            <p style="font-size:0.9rem">${db.ad}</p>
            <input id="auth-name" placeholder="الاسم الكامل">
            <input id="auth-pass" type="password" placeholder="كلمة المرور">
            <select id="auth-type" style="margin-bottom:10px">
                <option value="customer">زبون</option>
                <option value="store_owner">صاحب متجر</option>
                <option value="driver">سائق توصيل</option>
            </select>
            <button class="btn btn-primary" onclick="handleAuth()">دخول / تسجيل</button>
            <button class="btn btn-outline btn-sm" style="margin-top:10px" onclick="showPolicy()">سياسة الاستخدام</button>
        </div>`;
}

function handleAuth() {
    const name = document.getElementById('auth-name').value.trim();
    const pass = document.getElementById('auth-pass').value;
    const type = document.getElementById('auth-type').value;
    if (!name || !pass) return showModal("تنبيه", "أدخل الاسم وكلمة المرور");
    
    let user = db.users.find(u => u.name === name);
    if (user && user.pass !== pass) return showModal("خطأ", "كلمة المرور غير صحيحة");
    if (!user) {
        user = { id: 'U' + Date.now(), name, pass, type, cashCollected: 0, notifications: [] };
        db.users.push(user);
        sync();
    }
    currentUser = user;
    localStorage.setItem('z_user_id', user.id);
    updateUI();
}

function showPolicy() {
    showModal("📜 سياسة الاستخدام", db.policy || "التطبيق غير مسؤول قانونياً عن أي أضرار.");
}

// ---------- الرئيسية ----------
function renderHome(container) {
    let storesHtml = db.stores.map(s => {
        const avg = s.ratingCount ? (s.ratingSum / s.ratingCount).toFixed(1) : 'جديد';
        return `
        <div class="card" onclick="navigate('store', '${s.id}')" style="display:flex; gap:15px; align-items:center; cursor:pointer;">
            ${s.img ? `<img src="${s.img}" class="store-avatar">` : `<div class="store-avatar" style="display:flex; align-items:center; justify-content:center; font-size:2rem;">🏪</div>`}
            <div style="flex:1">
                <b style="font-size:1.1rem">${s.name}</b>
                <div class="rating-stars">${'★'.repeat(Math.round(avg))}${'☆'.repeat(5-Math.round(avg))} ${avg}</div>
                <small style="color:var(--gray)">${s.products?.length || 0} منتج</small>
            </div>
            <i class="fas fa-chevron-left" style="color:var(--primary)"></i>
        </div>`;
    }).join('');
    
    container.innerHTML = `
        <div class="card" style="background:var(--primary); color:#000; font-weight:bold; text-align:center">📢 ${db.ad}</div>
        <div style="display:flex; justify-content:space-between; margin:15px 0">
            <span>مرحباً، <b>${currentUser.name}</b> (${currentUser.type === 'store_owner' ? 'تاجر' : currentUser.type === 'driver' ? 'سائق' : 'زبون'})</span>
            ${currentUser.type === 'store_owner' ? `<button class="btn btn-sm btn-warning" onclick="navigate('my-store')"><i class="fas fa-store-alt"></i> متجري</button>` : ''}
        </div>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <button class="btn btn-outline btn-sm" onclick="randomStoreOrProduct()"><i class="fas fa-dice"></i> اقتراح عشوائي</button>
        </div>
        <h4 style="border-bottom:2px solid var(--primary); padding-bottom:5px">🏬 المتاجر</h4>
        <div id="stores-list">${storesHtml || '<p style="text-align:center">لا توجد متاجر بعد</p>'}</div>`;
}

function randomStoreOrProduct() {
    if (!db.stores.length) return showModal("عشوائي", "لا توجد متاجر");
    const store = db.stores[Math.floor(Math.random() * db.stores.length)];
    if (store.products?.length) {
        const prod = store.products[Math.floor(Math.random() * store.products.length)];
        showModal("🎲 اقتراح اليوم", `<b>${prod.name}</b> من متجر ${store.name}<br>السعر: ${prod.price} د.ل`, 'alert', () => navigate('store', store.id));
    } else {
        showModal("🎲", `متجر ${store.name} - لا يحتوي منتجات بعد`, 'alert', () => navigate('store', store.id));
    }
}

// ---------- عرض المتجر ----------
function renderStoreView(container, storeId) {
    const store = db.stores.find(s => s.id === storeId);
    if (!store) return navigate('home');
    if (!store.ownerId) store.ownerId = currentUser.id;
    
    const avg = store.ratingCount ? (store.ratingSum / store.ratingCount).toFixed(1) : '0.0';
    
    let productsHtml = (store.products || []).map(p => `
        <div class="card" style="display:flex; gap:12px; align-items:center">
            ${p.img ? `<img src="${p.img}" class="product-img">` : `<div class="product-img" style="background:var(--primary); display:flex; align-items:center; justify-content:center; font-size:1.8rem;">🍕</div>`}
            <div style="flex:1"><b>${p.name}</b><br><span style="color:var(--success)">${p.price} د.ل</span></div>
            <button class="btn btn-sm btn-primary" onclick="addToCart('${store.id}', '${p.name}', ${p.price})"><i class="fas fa-cart-plus"></i></button>
        </div>`).join('') || '<p>لا توجد منتجات حالياً</p>';
    
    const isOwner = currentUser.id === store.ownerId;
    
    container.innerHTML = `
        <button class="btn btn-sm btn-outline" style="margin-bottom:10px" onclick="navigate('home')"><i class="fas fa-arrow-right"></i> عودة</button>
        <div class="card" style="text-align:center">
            ${store.img ? `<img src="${store.img}" class="img-preview">` : ''}
            <h2 style="color:var(--primary)">${store.name}</h2>
            <div class="rating-stars" style="font-size:1.5rem">${'★'.repeat(Math.round(avg))}${'☆'.repeat(5-Math.round(avg))} (${avg})</div>
            ${!isOwner ? `<button class="btn btn-sm btn-outline" style="margin:10px auto" onclick="messageStoreOwner('${store.ownerId}')"><i class="fas fa-comment"></i> مراسلة المتجر</button>` : ''}
            ${!isOwner ? `<button class="btn btn-sm btn-warning" onclick="rateStore('${store.id}')"><i class="fas fa-star"></i> تقييم المتجر</button>` : ''}
        </div>
        <h4>📦 المنتجات</h4>
        ${productsHtml}`;
}

function messageStoreOwner(ownerId) {
    if (!ownerId) return showModal("خطأ", "لا يمكن مراسلة هذا المتجر حالياً");
    navigate('chat', ownerId);
}

function rateStore(storeId) {
    showModal("تقييم المتجر", "اختر تقييمك من 1 إلى 5", "prompt", (val) => {
        val = parseInt(val);
        if (val >=1 && val <=5) {
            const store = db.stores.find(s => s.id === storeId);
            store.ratingSum = (store.ratingSum || 0) + val;
            store.ratingCount = (store.ratingCount || 0) + 1;
            sync();
            showModal("شكراً", "تم تقييم المتجر بنجاح");
            navigate('store', storeId);
        } else showModal("خطأ", "قيمة غير صالحة");
    }, '<input id="modal-input-field" type="number" min="1" max="5" placeholder="1-5">');
}

function addToCart(sid, name, price) {
    cart.push({ sid, name, price });
    document.getElementById('cart-count').innerText = cart.length;
    showModal("السلة", `تم إضافة ${name}`);
}

// ---------- السلة والطلب ----------
function getCurrentLocation(callback) {
    if (!navigator.geolocation) return showModal("خطأ", "متصفحك لا يدعم تحديد الموقع");
    showModal("تحديد الموقع", "جاري الحصول على موقعك...");
    navigator.geolocation.getCurrentPosition(
        (pos) => {
            currentLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            document.getElementById('location-status').innerHTML = `✅ تم تحديد موقعك`;
            if (callback) callback();
            document.getElementById('sys-modal').style.display = 'none';
        },
        (err) => { showModal("خطأ", "لم نتمكن من الحصول على موقعك"); }
    );
}

function renderCart(container) {
    if (!cart.length) return container.innerHTML = `<div style="text-align:center; margin-top:60px"><i class="fas fa-shopping-basket fa-4x" style="color:var(--primary)"></i><h3>السلة فارغة</h3><button class="btn btn-primary" onclick="navigate('home')">تصفح المتاجر</button></div>`;
    const total = cart.reduce((s, i) => s + i.price, 0);
    container.innerHTML = `
        <h3>🛒 سلة المشتريات</h3>
        ${cart.map((item, idx) => `<div class="card" style="display:flex; justify-content:space-between"><span>${item.name}</span> <span>${item.price} د.ل <i class="fas fa-trash" style="color:var(--danger); margin-right:8px; cursor:pointer" onclick="cart.splice(${idx},1); navigate('cart')"></i></span></div>`).join('')}
        <div class="card" style="background:var(--success); text-align:center; font-size:1.3rem">الإجمالي: ${total} د.ل</div>
        <textarea id="order-address" placeholder="موقع التوصيل بالتفصيل"></textarea>
        <input id="order-phone" placeholder="رقم الهاتف">
        <div style="display:flex; gap:10px; align-items:center; margin:10px 0">
            <button class="btn btn-outline btn-sm" style="width:auto;" onclick="getCurrentLocation()"><i class="fas fa-map-marker-alt"></i> تحديد موقعي</button>
            <span id="location-status" style="color:var(--gray);"></span>
        </div>
        <button class="btn btn-primary" onclick="confirmOrder()">🚀 تأكيد الطلب</button>`;
}

function confirmOrder() {
    const addr = document.getElementById('order-address')?.value;
    const phone = document.getElementById('order-phone')?.value;
    if (!addr || !phone) return showModal("خطأ", "أدخل العنوان ورقم الهاتف");
    const storeId = cart[0].sid;
    const order = {
        id: 'ORD' + Date.now(),
        userId: currentUser.id, userName: currentUser.name,
        storeId, items: [...cart], location: addr, phone,
        status: 'قيد الانتظار ⏳', createdAt: new Date().toLocaleString(),
        driverId: null,
        coordinates: currentLocation,
        orderChat: []
    };
    db.orders.push(order);
    const store = db.stores.find(s => s.id === storeId);
    if (store) addNotification(store.ownerId, `طلب جديد من ${currentUser.name}`, '');
    cart = [];
    currentLocation = null;
    sync();
    showModal("تم", "تم إرسال الطلب بنجاح", 'alert', () => navigate('orders'));
}

// ---------- الطلبات ----------
function renderOrders(container) {
    const myOrders = db.orders.filter(o => o.userId === currentUser.id).reverse();
    container.innerHTML = `<h3>📋 طلباتي</h3>`;
    if (!myOrders.length) container.innerHTML += '<p>لا توجد طلبات</p>';
    myOrders.forEach(o => {
        container.innerHTML += `<div class="card">
            <b>#${o.id.slice(-6)}</b> - ${o.status}<br><small>${o.createdAt}</small>

function deleteMyStore() {
    showModal("تأكيد الحذف", "هل أنت متأكد من حذف متجرك نهائياً؟", "confirm", () => {
        db.stores = db.stores.filter(s => s.ownerId !== currentUser.id);
        sync();
        navigate('my-store');
    });
}

function editProduct(productId) {
    const store = db.stores.find(s => s.ownerId === currentUser.id);
    const product = store.products.find(p => p.id === productId);
    if (!product) return;
    tempImageBase64 = product.img || '';
    showModal("✏️ تعديل المنتج", `
        <input id="edit-prod-name" value="${product.name}" placeholder="اسم المنتج">
        <input id="edit-prod-price" type="number" value="${product.price}" placeholder="السعر">
        <label>صورة جديدة (اختياري)</label>
        <input type="file" accept="image/*" onchange="encodeImage(this)">
    `, 'confirm', () => {
        const newName = document.getElementById('edit-prod-name')?.value;
        const newPrice = document.getElementById('edit-prod-price')?.value;
        if (!newName || !newPrice) return showModal("خطأ", "الرجاء إدخال الاسم والسعر");
        product.name = newName;
        product.price = parseInt(newPrice);
        if (tempImageBase64) product.img = tempImageBase64;
        sync();
        navigate('my-store');
    });
}

function openAddProductModal(storeId) {
    tempImageBase64 = '';
    showModal("➕ إضافة منتج جديد", `
        <input id="add-prod-name" placeholder="اسم المنتج">
        <input id="add-prod-price" type="number" placeholder="السعر (د.ل)">
        <label>صورة المنتج (اختياري)</label>
        <input type="file" accept="image/*" onchange="encodeImage(this)">
    `, 'confirm', () => {
        const name = document.getElementById('add-prod-name')?.value;
        const price = document.getElementById('add-prod-price')?.value;
        if (!name || !price) return showModal("خطأ", "الرجاء إدخال الاسم والسعر");
        const store = db.stores.find(s => s.id === storeId);
        if (!store.products) store.products = [];
        store.products.push({ id: 'P'+Date.now(), name, price: parseInt(price), img: tempImageBase64 });
        sync();
        showModal("نجاح", "تم إضافة المنتج بنجاح", 'alert', () => navigate('my-store'));
    });
}

function createMyStore() {
    const name = document.getElementById('new-store-name').value;
    if (!name) return showModal("خطأ", "أدخل اسم المتجر");
    const newStore = {
        id: 'S' + Date.now(), name, ownerId: currentUser.id,
        img: tempImageBase64 || '', products: [], ratingSum: 0, ratingCount: 0
    };
    db.stores.push(newStore);
    sync();
    showModal("تم", "تم إنشاء المتجر", 'alert', () => navigate('my-store'));
}

function acceptOrder(orderId) {
    const order = db.orders.find(o => o.id === orderId);
    order.status = 'تم القبول ✅ (بانتظار سائق)';
    addNotification(order.userId, `تم قبول طلبك من المتجر وهو الآن بانتظار سائق`);
    notifyAllDrivers(`🚀 طلب جديد في منطقتك من ${order.userName}`);
    sync();
    navigate('my-store');
}

function deleteProduct(pid) {
    const store = db.stores.find(s => s.ownerId === currentUser.id);
    store.products = store.products.filter(p => p.id !== pid);
    sync();
    navigate('my-store');
}

// ---------- السائق (مع ميزة عشوائية للمناطق الساخنة) ----------
function renderDriver(container) {
    if (currentUser.type !== 'driver') {
        return container.innerHTML = `<div class="card" style="text-align:center"><h3>فعّل وضع السائق</h3><button class="btn btn-success" onclick="activateDriver()">تفعيل</button></div>`;
    }
    const available = db.orders.filter(o => o.status === 'تم القبول ✅ (بانتظار سائق)' && !o.driverId);
    const myTasks = db.orders.filter(o => o.driverId === currentUser.id && o.status !== 'تم التسليم ✅');
    
    container.innerHTML = `
        <div class="card" style="background:var(--dark); border-color:var(--success)">
            <h4>💰 كاش مجمع: ${currentUser.cashCollected || 0} د.ل</h4>
            <button class="btn btn-sm btn-warning" onclick="resetDriverCash()">تصفير الكاش</button>
        </div>
        <div style="margin-bottom:15px">
            <button class="btn btn-outline btn-sm" onclick="suggestHotZone()"><i class="fas fa-fire"></i> اقتراح منطقة ساخنة 🔥</button>
        </div>
        <h4>🚚 مهامي</h4>
        ${myTasks.map(o => {
            let mapLink = '#';
            if (o.coordinates) mapLink = `https://www.google.com/maps?q=${o.coordinates.lat},${o.coordinates.lng}`;
            return `
            <div class="card">
                <b>${o.userName}</b> - ${o.location}<br>
                <small>📞 ${o.phone}</small>
                ${o.coordinates ? `<a href="${mapLink}" target="_blank" style="color:var(--primary); display:block; margin:5px 0"><i class="fas fa-map-marked-alt"></i> فتح الموقع في الخرائط</a>` : ''}
                <button class="btn btn-sm btn-success" onclick="deliverOrder('${o.id}')">تم التسليم واستلام الكاش</button>
                <button class="btn btn-sm btn-outline" onclick="navigate('track','${o.id}')"><i class="fas fa-comments"></i> تتبع ودردشة</button>
            </div>`}).join('') || '<p>لا مهام</p>'}
        <h4>📋 طلبات متاحة</h4>
        ${available.map(o => `
            <div class="card">
                <b>${o.storeId ? db.stores.find(s=>s.id===o.storeId)?.name : ''}</b> - ${o.userName}<br>
                <small>📍 ${o.location}</small>
                <button class="btn btn-sm btn-primary" onclick="pickOrderDriver('${o.id}')">استلام</button>
            </div>`).join('')}`;
}

function suggestHotZone() {
    const pending = db.orders.filter(o => o.status === 'تم القبول ✅ (بانتظار سائق)');
    if (!pending.length) return showModal("لا توجد مناطق ساخنة", "لا توجد طلبات معلقة حالياً");
    const zones = [...new Set(pending.map(o => o.location.split('،')[0] || o.location))];
    const hot = zones[Math.floor(Math.random() * zones.length)];
    showModal("🔥 منطقة ساخنة", `نقترح التوجه إلى: <b>${hot}</b><br>يوجد طلبات في هذه المنطقة`);
}

function activateDriver() {
    currentUser.type = 'driver';
    db.users.find(u => u.id === currentUser.id).type = 'driver';
    sync();
    navigate('driver');
}

function pickOrderDriver(oid) {
    const order = db.orders.find(o => o.id === oid);
    order.driverId = currentUser.id;
    order.status = 'جاري التوصيل 🛵';
    if (!order.orderChat) order.orderChat = [];
    order.orderChat.push({ sender: 'system', text: `تم تعيين السائق ${currentUser.name} للطلب` });
    addNotification(order.userId, `السائق ${currentUser.name} في طريقه إليك`);
    const store = db.stores.find(s => s.id === order.storeId);
    if (store) addNotification(store.ownerId, `السائق ${currentUser.name} استلم الطلب #${order.id.slice(-6)}`);
    sync();
    navigate('driver');
}

function deliverOrder(oid) {
    showModal("استلام الكاش", "كم استلمت من الزبون؟", "prompt", (amount) => {
        amount = parseInt(amount);
        if (!amount) return;
        const order = db.orders.find(o => o.id === oid);
        order.status = 'تم التسليم ✅';
        currentUser.cashCollected = (currentUser.cashCollected || 0) + amount;
        db.users.find(u => u.id === currentUser.id).cashCollected = currentUser.cashCollected;
        if (!order.orderChat) order.orderChat = [];
        order.orderChat.push({ sender: 'system', text: `تم تسليم الطلب واستلام ${amount} د.ل` });
        addNotification(order.userId, `تم تسليم طلبك. شكراً لاستخدامك زلطن`);
        sync();
        navigate('driver');
    }, '<input id="modal-input-field" type="number" placeholder="المبلغ">');
}

function resetDriverCash() {
    showModal("تأكيد", "تصفير الكاش المجمع؟", "confirm", () => {
        currentUser.cashCollected = 0;
        db.users.find(u => u.id === currentUser.id).cashCollected = 0;
        sync();
        navigate('driver');
    });
}

// ---------- تتبع الطلب والدردشة المشتركة ----------
function renderOrderTracking(container, orderId) {
    const order = db.orders.find(o => o.id === orderId);
    if (!order) return navigate('home');
    const store = db.stores.find(s => s.id === order.storeId);
    const isCustomer = order.userId === currentUser.id;
    const isStoreOwner = store && store.ownerId === currentUser.id;
    const isDriver = order.driverId === currentUser.id;
    if (!isCustomer && !isStoreOwner && !isDriver) {
        return showModal("غير مسموح", "ليس لديك صلاحية عرض هذا الطلب", 'alert', () => navigate('home'));
    }
    
    if (!order.orderChat) order.orderChat = [];
    const driver = order.driverId ? db.users.find(u => u.id === order.driverId) : null;
    const mapLink = order.coordinates ? `https://www.google.com/maps?q=${order.coordinates.lat},${order.coordinates.lng}` : '#';
    
    let chatHtml = order.orderChat.map(m => {
        if (m.sender === 'system') return `<div class="chat-bubble bubble-system">${m.text}</div>`;
        const senderName = m.sender === currentUser.id ? 'أنت' : (db.users.find(u=>u.id===m.sender)?.name || 'مستخدم');
        return `<div class="chat-bubble ${m.sender === currentUser.id ? 'bubble-left' : 'bubble-right'}"><b>${senderName}:</b> ${m.text}</div>`;
    }).join('');
    
    container.innerHTML = `
        <button class="btn btn-sm btn-outline" onclick="history.back()"><i class="fas fa-arrow-right"></i> عودة</button>
        <div class="card">
            <h3>تتبع الطلب #${order.id.slice(-6)}</h3>
            <p><b>الحالة:</b> ${order.status}</p>
            <p><b>الزبون:</b> ${order.userName} | 📞 ${order.phone}</p>
            <p><b>العنوان:</b> ${order.location}</p>
            ${order.coordinates ? `<a href="${mapLink}" target="_blank" class="btn btn-outline btn-sm"><i class="fas fa-map-marker-alt"></i> عرض الموقع على الخريطة</a>` : ''}
            ${driver ? `<p><b>السائق:</b> ${driver.name}</p>` : ''}
        </div>
        <div class="card">
            <h4>💬 دردشة الطلب (مشتركة بين الأطراف)</h4>
            <div id="track-chat-box" style="height:250px; overflow-y:auto; display:flex; flex-direction:column; padding:8px; background:rgba(0,0,0,0.4); border-radius:12px;">
                ${chatHtml}
            </div>
            <div style="display:flex; gap:8px; margin-top:10px">
                <input id="track-msg-input" placeholder="اكتب رسالة...">
                <button class="btn btn-primary btn-sm" onclick="sendTrackMsg('${order.id}')">إرسال</button>
            </div>
        </div>`;
    setTimeout(() => { const box = document.getElementById('track-chat-box'); if(box) box.scrollTop = box.scrollHeight; }, 100);
}

function sendTrackMsg(orderId) {
    const inp = document.getElementById('track-msg-input');
    if (!inp.value.trim()) return;
    const order = db.orders.find(o => o.id === orderId);
    if (!order.orderChat) order.orderChat = [];
    order.orderChat.push({ sender: currentUser.id, text: inp.value.trim() });
    const store = db.stores.find(s => s.id === order.storeId);
    if (order.userId !== currentUser.id) addNotification(order.userId, `رسالة جديدة في الطلب #${orderId.slice(-6)}`);
    if (store && store.ownerId !== currentUser.id) addNotification(store.ownerId, `رسالة جديدة في الطلب #${orderId.slice(-6)}`);
    if (order.driverId && order.driverId !== currentUser.id) addNotification(order.driverId, `رسالة جديدة في الطلب #${orderId.slice(-6)}`);
    sync();
    navigate('track', orderId);
}

// ---------- البريد والمحادثات الخاصة ----------
function renderMail(container) {
    const notifs = currentUser.notifications || [];
    const chats = db.chats.filter(c => c.u1 === currentUser.id || c.u2 === currentUser.id);
    
    let notifHtml = notifs.map(n => `<div class="card" style="padding:10px; ${n.read ? 'opacity:0.6' : ''}" onclick="markNotifRead('${n.date}')">🔔 ${n.text}<br><small>${n.date}</small></div>`).join('');
    let chatHtml = chats.map(c => {
        const otherId = c.u1 === currentUser.id ? c.u2 : c.u1;
        const other = db.users.find(u => u.id === otherId) || {name: 'مستخدم'};
        const last = c.msgs[c.msgs.length-1];
        return `<div class="card" style="display:flex; justify-content:space-between" onclick="navigate('chat','${otherId}')">
            <div><b>${other.name}</b><br><small>${last.txt.substring(0,20)}</small></div>
            <i class="fas fa-trash" style="color:var(--danger)" onclick="event.stopPropagation();deleteChat('${c.id}')"></i>
        </div>`;
    }).join('');
    
    container.innerHTML = `<h3>📬 الإشعارات والرسائل</h3>
        <button class="btn btn-sm btn-outline" onclick="markAllNotifRead()">تعليم الكل مقروء</button>
        <h4>الإشعارات</h4>${notifHtml || '<p>لا توجد إشعارات</p>'}
        <h4>💬 المحادثات</h4>${chatHtml || '<p>لا توجد محادثات</p>'}`;
}

function markNotifRead(date) {
    const notif = currentUser.notifications.find(n => n.date === date);
    if (notif) notif.read = true;
    db.users.find(u => u.id === currentUser.id).notifications = currentUser.notifications;
    sync();
    navigate('mail');
}
function markAllNotifRead() {
    currentUser.notifications.forEach(n => n.read = true);
    sync();
    navigate('mail');
}

function renderFullChat(container, otherId) {
    const chatId = [currentUser.id, otherId].sort().join('_');
    let chat = db.chats.find(c => c.id === chatId);
    if (!chat) { chat = { id: chatId, u1: currentUser.id, u2: otherId, msgs: [{s:'system', txt:'بداية المحادثة'}] }; db.chats.push(chat); sync(); }
    const other = db.users.find(u => u.id === otherId) || {name: 'مستخدم'};
    
    container.innerHTML = `
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px">
            <button class="btn-icon" onclick="navigate('mail')"><i class="fas fa-arrow-right"></i></button>
            <h4 style="margin:0">${other.name}</h4>
        </div>
        <div id="chat-box" style="height:380px; overflow-y:auto; display:flex; flex-direction:column; padding:10px; background:rgba(0,0,0,0.4); border-radius:16px;">
            ${chat.msgs.map(m => m.s === 'system' ? `<div class="chat-bubble bubble-system">${m.txt}</div>` : `<div class="chat-bubble ${m.s === currentUser.id ? 'bubble-left' : 'bubble-right'}">${m.txt}</div>`).join('')}
        </div>
        <div style="display:flex; margin-top:10px; gap:8px">
            <input id="msg-input" placeholder="رسالتك...">
            <button class="btn btn-primary btn-sm" onclick="sendMsg('${chatId}')">إرسال</button>
        </div>`;
    setTimeout(() => { const box = document.getElementById('chat-box'); if(box) box.scrollTop = box.scrollHeight; }, 100);
}

function sendMsg(cid) {
    const inp = document.getElementById('msg-input');
    if (!inp.value) return;
    const chat = db.chats.find(c => c.id === cid);
    chat.msgs.push({ s: currentUser.id, txt: inp.value });
    const otherId = cid.replace(currentUser.id, '').replace('_', '');
    addNotification(otherId, `رسالة جديدة من ${currentUser.name}`, '');
    sync();
    navigate('chat', otherId);
}

function deleteChat(cid) {
    showModal("حذف", "حذف المحادثة؟", "confirm", () => {
        db.chats = db.chats.filter(c => c.id !== cid);
        sync(); navigate('mail');
    });
}

function sendDevNotification() {
    const userId = document.getElementById('notify-user').value;
    const text = document.getElementById('notify-text').value;
    if (!text) return showModal("خطأ", "أدخل نص الإشعار");
    addNotification(userId, text);
    showModal("تم", "تم إرسال الإشعار بنجاح");
}

function devDeleteOrder(orderId) {
    showModal("حذف طلب", "هل أنت متأكد من حذف هذا الطلب نهائياً؟", "confirm", () => {
        db.orders = db.orders.filter(o => o.id !== orderId);
        sync();
        renderSuperAdminPanel();
    });
}
function devRefreshProductsList() {
    const select = document.getElementById('dev-store-select');
    if (!select) return;
    const storeId = select.value;
    const store = db.stores.find(s => s.id === storeId);
    const listDiv = document.getElementById('dev-products-list');
    if (store && store.products) {
        listDiv.innerHTML = store.products.map(p => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:8px;">
                <span>${p.name} - ${p.price} د.ل</span>
                <div style="display:flex; gap:8px">
                    <i class="fas fa-edit" style="color:var(--warning); cursor:pointer;" onclick="devEditProduct('${storeId}', '${p.id}')"></i>
                    <i class="fas fa-trash" style="color:var(--danger); cursor:pointer;" onclick="devDeleteProduct('${storeId}', '${p.id}')"></i>
                </div>
            </div>`).join('');
    } else listDiv.innerHTML = '<p>لا توجد منتجات</p>';
    select.onchange = devRefreshProductsList;
}
function devEditProduct(storeId, productId) {
    const store = db.stores.find(s => s.id === storeId);
    const product = store.products.find(p => p.id === productId);
    if (!product) return;
    tempImageBase64 = product.img || '';
    showModal("✏️ تعديل منتج (مطور)", `
        <input id="dev-edit-name" value="${product.name}" placeholder="اسم المنتج">
        <input id="dev-edit-price" type="number" value="${product.price}" placeholder="السعر">
        <label>صورة جديدة (اختياري)</label>
        <input type="file" accept="image/*" onchange="encodeImage(this)">
    `, 'confirm', () => {
        const newName = document.getElementById('dev-edit-name')?.value;
        const newPrice = document.getElementById('dev-edit-price')?.value;
        if (!newName || !newPrice) return showModal("خطأ", "الرجاء إدخال الاسم والسعر");
        product.name = newName;
        product.price = parseInt(newPrice);
        if (tempImageBase64) product.img = tempImageBase64;
        sync();
        devRefreshProductsList();
        showModal("نجاح", "تم تعديل المنتج");
    });
}
function devDeleteProduct(storeId, productId) {
    const store = db.stores.find(s => s.id === storeId);
    store.products = store.products.filter(p => p.id !== productId);
    sync();
    devRefreshProductsList();
}
function devShowAddProduct() {
    const storeId = document.getElementById('dev-store-select').value;
    tempImageBase64 = '';
    showModal("➕ إضافة منتج (مطور)", `
        <input id="dev-prod-name" placeholder="اسم المنتج">
        <input id="dev-prod-price" type="number" placeholder="السعر">
        <label>صورة المنتج (اختياري)</label>
        <input type="file" accept="image/*" onchange="encodeImage(this)">
    `, 'confirm', () => {
        const name = document.getElementById('dev-prod-name')?.value;
        const price = document.getElementById('dev-prod-price')?.value;
        if (!name || !price) return showModal("خطأ", "الرجاء إدخال الاسم والسعر");
        const store = db.stores.find(s => s.id === storeId);
        if (!store.products) store.products = [];
        store.products.push({ id: 'P'+Date.now(), name, price: parseInt(price), img: tempImageBase64 });
        sync();
        devRefreshProductsList();
        showModal("نجاح", "تم إضافة المنتج بنجاح");
    });
}
function devDeleteStore(sid) {
    db.stores = db.stores.filter(s => s.id !== sid);
    sync(); renderSuperAdminPanel();
}
function devAddStore() {
    const name = document.getElementById('dev-s-name').value;
    const owner = document.getElementById('dev-s-owner').value;
    if (!name) return;
    db.stores.push({ id: 'S'+Date.now(), name, ownerId: owner, products: [], ratingSum:0, ratingCount:0 });
    sync(); renderSuperAdminPanel();
}

// بدء التطبيق
loadData();
</script>
</body>
